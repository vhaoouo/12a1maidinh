        .khung{

            background: white;
            padding: 20px;
            border-radius: 15px;

            width: 250px;
            height: 180px;

            margin: 10px;
            border-radius: 10px;

            transform: scale(1.1);

         }
        .chinh {
            background: #fff0f5;
            padding: 15px;
            margin: 15px 0;
            border-radius: 15px;
            transition: 0.3s;
        }

            .chinh:hover {
            transform: scale(1.02);
            background: #ffe4ec;
        }
        .video video{
            width: 250px;
            height: 180px;
            object-fit: cover;
            margin: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }
         .video video:hover, {
            transform: scale(1.1);
        }
        .video video:hover {
    transform: scale(1.8);
    z-index: 999;
    position: relative;
    box-shadow:10px rgba(0,0,0,0.35);
         }
